# Intel x86_64 — MySQL 5.7 + Redis + Elasticsearch 2.4（Transport 9300，匹配 Spring Boot 1.5 客户端）
# 用法：在项目根目录执行 docker compose up -d
# 应用访问：127.0.0.1:3306 / 6379 / 9300，与 src/main/resources/application.yml 一致
version: "3.8"
services:
  # mysql:
  #   image: mysql:5.7
  #   container_name: tmall-mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: admin
  #     MYSQL_DATABASE: tmall_springboot
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - tmall-mysql-data:/var/lib/mysql
  #     - ./SQL/tmall_springboot.sql:/docker-entrypoint-initdb.d/01-tmall_springboot.sql:ro
  #   command: --character-set-server=utf8 --collation-server=utf8_general_ci

  redis:
    image: redis:7-alpine
    container_name: tmall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:2.4.6
    container_name: tmall-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

volumes:
  tmall-mysql-data:
